onboarding = false

[theme]
name = "catppuccin"

[ui]
agent_panel_sort = "priority"
hide_tab_bar_when_single_tab = true

[ui.sidebar.agents]
rows = [["state_icon", "tab", "workspace"], ["state_text"]]

[ui.toast]
delivery = "terminal"

[[keys.command]]
key = "prefix+alt+g"
type = "pane"
command = "lazygit"

[[keys.command]]
key = "prefix+alt+z"
type = "shell"
command = "zed ."
